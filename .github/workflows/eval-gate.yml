name: eval-gate

# Always runs on PRs so the `run-eval` check always reports a result —
# branch protection requires it, and skipping a required check via
# `paths-ignore` leaves the PR in a permanent BLOCKED state. We do the
# docs-only short-circuit inline (first step) and report success without
# running the heavy eval when there is no Python or workflow change.
on:
  pull_request:

permissions:
  contents:      read
  pull-requests: write
  issues:        write

jobs:
  run-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history back to the merge-base so we can diff against the
          # PR's base branch and inspect what actually changed.
          fetch-depth: 0

      - name: Detect docs-only PR
        id: detect
        run: |
          base="${{ github.event.pull_request.base.ref }}"
          changed=$(git diff --name-only "origin/${base}"...HEAD)
          echo "Changed files:"
          echo "$changed"
          if echo "$changed" | grep -qvE '^(.*\.md$|docs/|\.github/ISSUE_TEMPLATE/)' ; then
            echo "code_or_workflow_changed=true"  >> "$GITHUB_OUTPUT"
          else
            echo "code_or_workflow_changed=false" >> "$GITHUB_OUTPUT"
            echo "Docs-only PR — eval skipped, gate reports success."
          fi

      - name: Skip notice
        if: steps.detect.outputs.code_or_workflow_changed == 'false'
        run: |
          echo "## Eval gate skipped — docs-only PR" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "All changed files are markdown or under docs/. The eval harness was not run." >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Python
        if: steps.detect.outputs.code_or_workflow_changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        if: steps.detect.outputs.code_or_workflow_changed == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[langgraph,dev]"

      # Run the harness. --quiet suppresses per-case stdout; the markdown is
      # written to report.md (used by the PR-comment step); JSON artefact goes
      # to eval_results/ci.json. We capture the exit code without letting
      # `set -e` kill the step, so the comment-post and artifact-upload steps
      # still run on a failed eval. The final step enforces the captured code.
      - name: Run eval harness
        id:   eval
        if:   steps.detect.outputs.code_or_workflow_changed == 'true'
        run: |
          python scripts/run_eval.py \
            --gold datasets/gold/v0.2.jsonl \
            --quiet \
            --markdown-out eval_results/report.md \
            --output      eval_results/ci.json \
            && code=0 || code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"

      - name: Upload JSON report
        if: always() && steps.detect.outputs.code_or_workflow_changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: eval-report-json
          path: eval_results/ci.json
          if-no-files-found: warn

      - name: Find existing comment
        if: always() && steps.detect.outputs.code_or_workflow_changed == 'true' && github.event_name == 'pull_request'
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: ProcessGuard eval gate

      - name: Post or update PR comment
        if: always() && steps.detect.outputs.code_or_workflow_changed == 'true' && github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: eval_results/report.md
          edit-mode: replace

      - name: Enforce gate exit code
        if: always() && steps.detect.outputs.code_or_workflow_changed == 'true'
        run: |
          test "${{ steps.eval.outputs.exit_code }}" = "0"
